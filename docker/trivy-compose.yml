services:
  # Trivy Server (Optional - for vulnerability scanning)
  trivy-server:
    image: aquasec/trivy:latest
    container_name: trivy-server
    command: ["server", "--listen", "0.0.0.0:8080"]
    ports:
      - "8080:8080"
    volumes:
      - trivy-cache:/root/.cache/
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Clair Server (Alternative scanner)
  clair:
    image: quay.io/projectquay/clair:latest
    container_name: clair-server
    ports:
      - "6060:6060"
    environment:
      CLAIR_CONF: /config/config.yaml
      CLAIR_MODE: combo
    volumes:
      - ./clair-config.yaml:/config/config.yaml:ro
    depends_on:
      - clair-db
    restart: unless-stopped

  clair-db:
    image: postgres:14
    container_name: clair-db
    environment:
      POSTGRES_DB: clair
      POSTGRES_USER: clair
      POSTGRES_PASSWORD: clair
    volumes:
      - clair-db-data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  trivy-cache:
  clair-db-data:

<div id="vulnerabilities-view" style="display: none;">
  <h4>Vulnerability Scanning</h4>
  <hr class="mb-3">
  
  <div class="mb-3">
    <button class="btn btn-primary" id="scanAllBtn">
      <i class="bi bi-shield-check"></i> Scan Latest Tags
    </button>
    <button class="btn btn-secondary" id="refreshVulnBtn">
      <i class="bi bi-arrow-clockwise"></i> Refresh
    </button>
    <small class="text-muted ms-2">Scans latest tag per repository based on auto-scan rules (or all repos if no rules)</small>
  </div>
  
  <div class="row mb-3">
    <div class="col-md-3">
      <div class="card text-center">
        <div class="card-body">
          <h6 class="text-muted">Total Scanned</h6>
          <h3 id="vuln-total-scanned">0</h3>
        </div>
      </div>
    </div>
    <div class="col-md-3">
      <div class="card text-center border-danger">
        <div class="card-body">
          <h6 class="text-danger">Critical</h6>
          <h3 id="vuln-critical">0</h3>
        </div>
      </div>
    </div>
    <div class="col-md-3">
      <div class="card text-center border-warning">
        <div class="card-body">
          <h6 class="text-warning">High</h6>
          <h3 id="vuln-high">0</h3>
        </div>
      </div>
    </div>
    <div class="col-md-3">
      <div class="card text-center border-info">
        <div class="card-body">
          <h6 class="text-info">Medium</h6>
          <h3 id="vuln-medium">0</h3>
        </div>
      </div>
    </div>
  </div>
  
  <div class="card">
    <div class="card-header">
      <h5 class="mb-0">Scan Results</h5>
    </div>
    <div class="card-body">
      <div class="table-responsive">
        <table class="table table-hover">
          <thead>
            <tr>
              <th>Repository</th>
              <th>Tag</th>
              <th>Critical</th>
              <th>High</th>
              <th>Medium</th>
              <th>Low</th>
              <th>Total</th>
              <th>Scanned</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="vuln-results-table">
            <tr>
              <td colspan="9" class="text-center text-muted">No scan results available. Click "Scan All Images" to start.</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

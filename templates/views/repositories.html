<div id="repositories-view">
  <h4 class="mb-2">Repositories & Images</h4>
  <hr class="mb-3">
  
  <div class="mb-3 d-flex gap-2">
    <input type="text" id="searchBox" class="form-control" placeholder="Search repositories...">
  </div>

  <div class="row">
    <div class="col-md-4">
      <div class="card">
        <div class="card-header d-flex justify-content-between align-items-center">
          <strong>Repositories <span class="badge bg-secondary" id="stat-repos">0</span></strong>
          <button class="btn btn-sm btn-primary" id="refreshRepos">
            <i class="bi bi-arrow-clockwise"></i>
          </button>
        </div>
        <div class="card-body p-0" style="max-height: 70vh; overflow-y: auto;">
          <div id="repo-list" class="list-group list-group-flush">
            <div class="text-center p-4 text-muted">
              Select a registry from the navbar
            </div>
          </div>
        </div>
      </div>
    </div>
    
    <div class="col-md-8">
      <div class="card">
        <div class="card-header">
          <div class="d-flex justify-content-between align-items-center mb-2">
            <div>
              <strong>Tags <span class="badge bg-secondary" id="stat-tags" style="display:none;">0</span></strong>
            </div>
            <div>
            {% if not read_only %}
            <button class="btn btn-sm btn-danger" id="deleteRepoBtn" style="display:none;">
              <i class="bi bi-trash"></i> Delete Repository
            </button>
            {% endif %}
            </div>
          </div>
          <div class="d-flex gap-2" id="tag-controls" style="display:none;">
            <select class="form-select form-select-sm" id="sortTags" style="width:auto;">
              <option value="name">Sort: Name</option>
              <option value="size">Sort: Size</option>
              <option value="date">Sort: Date</option>
            </select>
            <input type="text" class="form-control form-control-sm" id="filterTags" placeholder="Filter tags..." style="max-width:200px;">
          </div>
        </div>
        <div class="card-body" id="tags-container" style="max-height: 70vh; overflow-y: auto;">
          <div id="image-name-section" style="display:none;" class="mb-3 pb-2 border-bottom">
            <h5 class="mb-0 fw-semibold" style="font-size: 1.1rem; color: #172b4d;">
              <i class="bi bi-box-seam text-primary"></i> <span id="repo-title"></span>
            </h5>
          </div>
          <div id="tags-list">
            <p class="text-muted text-center">Select a repository to view tags</p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

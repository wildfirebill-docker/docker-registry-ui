<nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom">
  <div class="container-fluid">
    <button class="btn btn-outline-secondary" id="sidebarToggle">
      <i class="bi bi-list"></i>
    </button>
    <a class="navbar-brand ms-2" href="#">🐳 Docker Registry UI</a>
    
    <div class="ms-auto d-flex align-items-center">
      <select class="form-select form-select-sm me-2" id="registrySelector" style="width: auto;">
        <option value="">Select Registry...</option>
        {% for reg in registries %}
        <option value="{{ reg.name if reg is mapping else reg }}" {% if reg is mapping and reg.get('default') %}data-default="true"{% endif %}>{{ reg.name if reg is mapping else reg }}</option>
        {% endfor %}
      </select>
      
      <span class="badge {{ 'bg-success' if read_only else 'bg-danger' }} me-2">
        {{ 'READ ONLY' if read_only else 'READ/WRITE' }}
      </span>
    </div>
  </div>
</nav>

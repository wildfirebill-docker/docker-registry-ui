<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid">
    <button class="btn btn-dark" id="sidebarToggle">
      <i class="bi bi-list"></i>
    </button>
    <a class="navbar-brand ms-2" href="#">🐳 Docker Registry UI</a>
    
    <div class="ms-auto d-flex align-items-center">
      <button class="btn btn-sm btn-outline-light me-2" id="themeToggle" title="Toggle dark mode">
        <i class="bi bi-moon-fill" id="themeIcon"></i>
      </button>
      
      <select class="form-select form-select-sm me-2" id="registrySelector" style="width: auto;">
        <option value="">Select Registry...</option>
        {% for reg in registries %}
        <option value="{{ reg.name }}" {% if reg.get('default') %}data-default="true"{% endif %}>{{ reg.name }}</option>
        {% endfor %}
      </select>
      
      <span class="badge {{ 'bg-info' if read_only else 'bg-warning text-dark' }} me-2">
        {{ 'READ ONLY' if read_only else 'READ/WRITE' }}
      </span>
    </div>
  </div>
</nav>
